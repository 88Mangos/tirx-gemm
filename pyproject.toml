[tool.pyright]
# disable reportMissingImports
reportMissingImports = false
reportMissingModuleSource = false

# Ignore the specific type form error globally for Pyright
reportInvalidTypeForm = false

# TIRx API hover help
stubPath = "typings"

[tool.ruff]
line-length = 200

[tool.ruff.lint]
# Ignore F401 (unused imports) globally for Ruff
ignore = ["F401"]